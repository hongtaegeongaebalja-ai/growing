<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Growing - 하루 목표 성장 앱</title>

<meta name="description" content="Growing은 목표 체크, 성장 기록, 영상 업로드 기능이 있는 성장 웹앱입니다.">

<meta property="og:title" content="Growing">
<meta property="og:description" content="하루 목표와 성장 기록 앱">
<meta property="og:type" content="website">

<meta name="theme-color" content="#2fb344">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
  background:#e9ffe8;
  color:#12351d;
}

.app{
  width:100%;
  min-height:100vh;
}

.topbar{
  position:sticky;
  top:0;
  z-index:100;
  background:#ffffffdd;
  backdrop-filter:blur(10px);
  border-bottom:1px solid #d7f0d7;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:28px;
  font-weight:900;
  color:#1d8a3e;
}

.btn{
  border:none;
  background:#2fb344;
  color:white;
  padding:12px 16px;
  border-radius:14px;
  font-weight:800;
  cursor:pointer;
}

.btn2{
  border:none;
  background:#efffef;
  color:#22753c;
  padding:12px 16px;
  border-radius:14px;
  font-weight:800;
  cursor:pointer;
}

.container{
  width:100%;
  max-width:1100px;
  margin:auto;
  padding:18px;
}

.card{
  background:white;
  border-radius:24px;
  padding:18px;
  border:1px solid #d9f3d9;
  box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.auth{
  width:100%;
  max-width:430px;
  margin:40px auto;
}

.input{
  width:100%;
  padding:15px;
  margin-top:12px;
  border-radius:16px;
  border:1px solid #cceccc;
  outline:none;
}

.input:focus{
  border-color:#2fb344;
}

.title{
  font-size:28px;
  font-weight:900;
  margin-bottom:10px;
}

.sub{
  color:#5f7463;
  margin-top:8px;
}

.hidden{
  display:none;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.profile{
  display:flex;
  gap:14px;
  align-items:center;
}

.avatar{
  width:70px;
  height:70px;
  border-radius:22px;
  background:#d6f7d4;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  font-weight:900;
  color:#2b8f44;
}

.level{
  margin-top:8px;
  background:#efffef;
  color:#23823f;
  display:inline-block;
  padding:7px 12px;
  border-radius:999px;
  font-weight:800;
}

.goalBox{
  display:flex;
  gap:10px;
  margin-top:16px;
}

.goalInput{
  flex:1;
}

.goalList{
  margin-top:18px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.goal{
  background:#f8fff8;
  border:1px solid #d9f3d9;
  border-radius:18px;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.feed{
  margin-top:24px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.post{
  background:white;
  border-radius:24px;
  overflow:hidden;
  border:1px solid #d9f3d9;
}

.postTop{
  padding:14px;
  font-weight:900;
}

.postImg{
  width:100%;
  height:240px;
  background:linear-gradient(135deg,#dbffdb,#ffffff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  font-weight:900;
  color:#249141;
}

.postBody{
  padding:14px;
}

.bottomNav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#ffffffee;
  border-top:1px solid #d7f0d7;
  display:flex;
  justify-content:space-around;
  padding:10px;
  backdrop-filter:blur(10px);
}

.navBtn{
  background:none;
  border:none;
  font-weight:800;
  color:#467050;
}

@media(max-width:800px){

  .grid{
    grid-template-columns:1fr;
  }

  .feed{
    grid-template-columns:1fr;
  }

}

</style>
</head>
<body>

<div id="authScreen" class="auth">

<div class="card">

<div class="title">Growing</div>

<p class="sub">
하루 목표를 기록하고 성장하는 앱
</p>

<input id="nickname" class="input" placeholder="닉네임">

<input id="email" type="email" class="input" placeholder="이메일">

<input id="password" type="password" class="input" placeholder="비밀번호">

<button id="signupBtn" class="btn" style="width:100%;margin-top:14px;">
회원가입
</button>

<button id="loginBtn" class="btn2" style="width:100%;margin-top:10px;">
로그인
</button>

</div>

</div>

<div id="mainApp" class="hidden">

<header class="topbar">

<div class="logo">
Growing
</div>

<button id="logoutBtn" class="btn2">
로그아웃
</button>

</header>

<div class="container">

<div class="grid">

<div class="card">

<div class="profile">

<div class="avatar">
G
</div>

<div>

<div id="profileName" style="font-size:24px;font-weight:900;">
User
</div>

<div class="level">
Lv.1 새싹
</div>

</div>

</div>

</div>

<div class="card">

<div style="font-size:22px;font-weight:900;">
오늘 목표
</div>

<div class="goalBox">

<input id="goalInput" class="input goalInput" placeholder="목표 입력">

<button id="addGoalBtn" class="btn">
+
</button>

</div>

<div id="goalList" class="goalList"></div>

</div>

</div>

<div class="feed">

<div class="post">

<div class="postTop">
Growing Team
</div>

<div class="postImg">
목표 완료
</div>

<div class="postBody">
오늘 목표 성공!
</div>

</div>

<div class="post">

<div class="postTop">
Growing Team
</div>

<div class="postImg">
성장 기록
</div>

<div class="postBody">
매일 성장해보자 🚀
</div>

</div>

</div>

</div>

<nav class="bottomNav">

<button class="navBtn">
홈
</button>

<button class="navBtn">
영상
</button>

<button class="navBtn">
친구
</button>

<button class="navBtn">
프로필
</button>

</nav>

</div>





<!-- Firebase -->
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged,
  updateProfile
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



const firebaseConfig = {

  apiKey: "AIzaSyC6BZ6FNpp8b-zfazkN_FwH9jfeG-9yvlU",

  authDomain:
  "project-1402936998645054843.firebaseapp.com",

  projectId:
  "project-1402936998645054843",

  storageBucket:
  "project-1402936998645054843.firebasestorage.app",

  messagingSenderId:
  "679124552041",

  appId:
  "1:679124552041:web:818eefd82cb99c5d2895f8",

  measurementId:
  "G-230WFZ0G6P"

};



const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);



const authScreen =
document.getElementById("authScreen");

const mainApp =
document.getElementById("mainApp");



document.getElementById("signupBtn")
.onclick = async()=>{

  const nickname =
  document.getElementById("nickname").value;

  const email =
  document.getElementById("email").value;

  const password =
  document.getElementById("password").value;

  if(!nickname || !email || !password){

    alert("모든 칸 입력해줘");

    return;

  }

  try{

    const userCredential =
    await createUserWithEmailAndPassword(
      auth,
      email,
      password
    );

    await updateProfile(
      userCredential.user,
      {
        displayName:nickname
      }
    );

    await setDoc(
      doc(db,"users",userCredential.user.uid),
      {
        nickname:nickname,
        email:email,
        createdAt:Date.now()
      }
    );

    alert("회원가입 완료!");

  }catch(error){

    alert(error.message);

  }

};



document.getElementById("loginBtn")
.onclick = async()=>{

  const email =
  document.getElementById("email").value;

  const password =
  document.getElementById("password").value;

  try{

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

    alert("로그인 성공!");

  }catch(error){

    alert("로그인 실패");

  }

};



document.getElementById("logoutBtn")
.onclick = async()=>{

  await signOut(auth);

};



onAuthStateChanged(auth,(user)=>{

  if(user){

    authScreen.classList.add("hidden");

    mainApp.classList.remove("hidden");

    document.getElementById(
      "profileName"
    ).innerText =
    user.displayName || "User";

  }else{

    authScreen.classList.remove("hidden");

    mainApp.classList.add("hidden");

  }

});



const goalInput =
document.getElementById("goalInput");

const goalList =
document.getElementById("goalList");



document.getElementById("addGoalBtn")
.onclick = ()=>{

  const text = goalInput.value;

  if(!text) return;

  const div =
  document.createElement("div");

  div.className = "goal";

  div.innerHTML = `
    <span>${text}</span>
    <button class="btn2">완료</button>
  `;

  div.querySelector("button")
  .onclick = ()=>{

    div.style.opacity = ".5";

  };

  goalList.prepend(div);

  goalInput.value = "";

};

</script>

</body>
</html>
